# Effective config example for a Splunk Java agent reporting to OpAMP.
file_format: "1.0"
disabled: false
log_level: "info"
attribute_limits:
  attribute_count_limit: 128
  attribute_value_length_limit: 12000
propagator:
  composite_list:
    - "tracecontext"
    - "baggage"
tracer_provider:
  limits:
    attribute_count_limit: 128
    attribute_value_length_limit: 12000
    event_attribute_count_limit: 128
    event_count_limit: 128
    link_attribute_count_limit: 128
    link_count_limit: 1000
  processors:
    - batch:
        exporter:
          otlp_http:
            compression: "gzip"
            endpoint: "http://127.0.0.1:4318/v1/traces"
            headers_list:
              - "x-sf-token=*"
            timeout: 10000
            tls:
              ca_file: ""
              cert_file: ""
              key_file: ""
        export_timeout: 30000
        max_export_batch_size: 512
        max_queue_size: 2048
        schedule_delay: 5000
  sampler:
    always_on:
meter_provider:
  exemplar_filter: "trace_based"
  readers:
    - periodic:
        exporter:
          otlp_http:
            compression: "gzip"
            default_histogram_aggregation: "explicit_bucket_histogram"
            endpoint: "http://127.0.0.1:4318/v1/metrics"
            headers_list:
              - "x-sf-token=*"
            temporality_preference: "cumulative"
            timeout: 10000
            tls:
              ca_file: ""
              cert_file: ""
              key_file: ""
        interval: 60000
        timeout: 30000
logger_provider:
  limits:
    attribute_count_limit: 128
  processors:
    - batch:
        exporter:
          otlp_http:
            compression: "gzip"
            endpoint: "http://127.0.0.1:4318/v1/logs"
            headers_list:
              - "x-sf-token=*"
            timeout: 10000
            tls:
              ca_file: ""
              cert_file: ""
              key_file: ""
        export_timeout: 30000
        max_export_batch_size: 512
        max_queue_size: 2048
        schedule_delay: 1000
distribution:
  splunk:
    access_token: "*************"
    realm: "us0"
    trace_response_header:
      enabled: true
    profiling:
      exporter:
        otlp_log_http:
          endpoint: "http://127.0.0.1:4318/v1/logs"
      always_on:
        cpu_profiler:
          enabled: true
          sampling_interval: 1000
        memory_profiler:
          enabled: false
      callgraphs:
        enabled: false
        sampling_interval: 10
        selection_probability: 0.01
    "opamp:/development":
      endpoint: "https://opamp.example.com/v1/opamp"
      polling_interval: 30000
